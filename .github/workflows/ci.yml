name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Start server for integration tests
        run: |
          mkdir -p /tmp/test-data
          PORT=3099 DB_PATH=/tmp/test-data/webhookmail-test.db node src/index.js &
          npx wait-on http://localhost:3099/health --timeout 30000
        env:
          RESEND_API_KEY: dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PRICE_ID: price_dummy

      - name: Run integration tests
        run: TEST_PORT=3099 npm run test:integration

      - name: Stop server
        run: pkill -f "node src/index.js" || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
