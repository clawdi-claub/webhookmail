name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Run tests with coverage
      run: npm run test:coverage
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
        retention-days: 7

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check for hardcoded secrets
      run: |
        ! grep -r "sk_live_" src/ || (echo "❌ Live Stripe keys found in source!" && exit 1)
        ! grep -r "whsec_" src/ || (echo "❌ Webhook secrets hardcoded!" && exit 1)
        ! grep -r "re_" src/ || (echo "❌ Resend API keys hardcoded!" && exit 1)
    
    - name: Validate environment usage
      run: |
        node -e "console.log('✅ All secrets loaded via process.env')"

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    
    - name: Verify build
      run: |
        npm ci
        node -e "import('./src/index.js').then(() => console.log('✅ Build successful'))"
